<!DOCTYPE html>
<html lang="ko" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio — Designer</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,200;0,300;0,400;0,500;0,700;0,900;1,200;1,300&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* ── Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Space Grotesk', sans-serif; background: #1A1A1A url('hero/1.png') center/cover no-repeat fixed; color: #EDEDEB; overflow-x: hidden; }
    body::before { content: ''; position: fixed; inset: 0; background: rgba(18,18,18,0.80); z-index: 0; pointer-events: none; }
    #nav, #hero, footer { position: relative; z-index: 1; }
    h1, h2, h3, h4 { font-family: 'Archivo', sans-serif; }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: #1A1A1A; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

    /* ── Scroll reveal ── */
    .r { opacity:0; transform:translateY(28px); transition:opacity 0.9s cubic-bezier(0.16,1,0.3,1), transform 0.9s cubic-bezier(0.16,1,0.3,1); }
    .r.on { opacity:1; transform:translateY(0); }
    .d1 { transition-delay:0.1s; } .d2 { transition-delay:0.22s; } .d3 { transition-delay:0.36s; } .d4 { transition-delay:0.5s; }
    @media(prefers-reduced-motion:reduce){ .r { opacity:1; transform:none; transition:none; } }

    /* ═══════════════════════════════════════════════════════════
       NAV — Always glass (hero image is behind)
    ═══════════════════════════════════════════════════════════ */
    #nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200; transition: transform 0.3s ease;
      background: transparent;
    }
    .nav-hidden { transform: translateY(-100%); }
    .nav-inner {
      display: flex; align-items: center; justify-content: space-between;
      padding: 26px 60px;
    }
    .nav-logo {
      font-family: 'Archivo', sans-serif; font-weight: 300;
      font-size: 1rem; color: #EDEDEB; letter-spacing: 0.18em;
      text-transform: uppercase; text-decoration: none; margin-right: auto;
    }
    .nav-links { display: flex; align-items: center; gap: 44px; margin-right: 4%; }
    .nav-link {
      font-size: 0.65rem; color: rgba(237,237,235,0.48);
      letter-spacing: 0.22em; text-transform: uppercase;
      text-decoration: none; transition: color 0.2s;
    }
    .nav-link:hover { color: #EDEDEB; }
    .nav-dots { display:grid; grid-template-columns:repeat(3,4px); gap:4px; opacity:0.35; transition:opacity 0.2s; cursor:pointer; }
    .nav-dots:hover { opacity:0.75; }
    .nav-dots span { width:3px; height:3px; border-radius:50%; background:#EDEDEB; display:block; }
    #mob-btn { display:none; background:none; border:none; cursor:pointer; color:rgba(237,237,235,0.55); }
    #mob-menu {
      display: none; padding: 14px 24px 22px;
      background: rgba(9,9,15,0.96); backdrop-filter: blur(24px);
          }
    #mob-menu a {
      display: block; padding: 11px 0;
      font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(237,237,235,0.45); text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,0.05); transition: color 0.2s;
    }
    #mob-menu a:last-child { border-bottom: none; }
    #mob-menu a:hover { color: #EDEDEB; }
    .nav-divider {
      height: 1px;
      width: 50%;
      margin-left: auto;
      background: rgba(237,237,235,0.12);
    }
    @media(max-width:900px){
      .nav-links { display:none; margin-right: 4%; } .nav-dots { display:none; }
      #mob-btn { display:block; } .nav-inner { padding: 20px 24px; }
      .nav-divider { width: 70%; }
    }

    /* ═══════════════════════════════════════════════════════════
       HERO — Full-screen slide show (HBO style)
    ═══════════════════════════════════════════════════════════ */
    #hero { position: relative; height: 100vh; overflow: hidden; }

    /* Slide images — stacked, fade in/out */
    .slide {
      position: absolute; inset: 0;
      background-size: cover; background-position: center;
      opacity: 0;
      transition: opacity 1.4s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 0;
    }
    .slide.active { opacity: 1; }

    /* Gradient overlays */
    .ov-left {
      position: absolute; inset: 0; z-index: 1;
      background: linear-gradient(
        105deg,
        rgba(9,9,15,0.92) 0%,
        rgba(9,9,15,0.68) 40%,
        rgba(9,9,15,0.22) 70%,
        rgba(9,9,15,0.04) 100%
      );
    }
    .ov-bottom {
      position: absolute; bottom:0; left:0; right:0; height:220px; z-index:1;
      background: linear-gradient(to top, rgba(9,9,15,0.88) 0%, transparent 100%);
    }
    .ov-top {
      position: absolute; top:0; left:0; right:0; height:130px; z-index:1;
      background: linear-gradient(to bottom, rgba(9,9,15,0.55) 0%, transparent 100%);
    }

    /* Left side: rotated vertical text */
    .hero-side {
      position: absolute; left: 22px; top: 50%; z-index: 10;
      transform: translateY(-50%) rotate(-90deg);
      transform-origin: center center;
      display: flex; align-items: center; gap: 14px;
      font-size: 0.58rem; color: rgba(237,237,235,0.3);
      letter-spacing: 0.3em; text-transform: uppercase; white-space: nowrap;
      pointer-events: none;
    }
    .hero-side::before {
      content: ''; display: block; width: 28px; height: 1px;
      background: rgba(237,237,235,0.25);
    }

    /* Main content (left-center) */
    .hero-main {
      position: absolute; z-index: 10;
      left: 80px; top: 50%;
      transform: translateY(-50%);
    }
    .hero-label {
      display: flex; align-items: center; gap: 10px;
      font-size: 0.62rem; color: #22D3EE;
      letter-spacing: 0.30em; text-transform: uppercase;
      margin-bottom: 22px;
    }
    .hero-label::before {
      content: ''; width: 26px; height: 1px; background: #22D3EE;
    }
    .hero-h1 {
      font-family: 'Archivo', sans-serif; font-weight: 900;
      font-size: clamp(4.05rem, 9vw, 8.55rem);
      line-height: 0.90; color: #EDEDEB;
      letter-spacing: -0.01em; margin-bottom: 32px;
    }
    .hero-desc {
      font-size: 0.88rem; color: rgba(237,237,235,0.48);
      font-weight: 300; line-height: 1.75;
      max-width: 320px; margin-bottom: 44px;
      border-left: 1px solid rgba(237,237,235,0.28);
      padding-left: 20px;
    }
    .hero-btn {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 13px 30px;
      border: 1px solid rgba(237,237,235,0.22);
      color: #EDEDEB; font-size: 0.72rem;
      letter-spacing: 0.18em; text-transform: uppercase;
      text-decoration: none;
      transition: background 0.3s, border-color 0.3s;
    }
    .hero-btn:hover { background: rgba(237,237,235,0.08); border-color: rgba(237,237,235,0.55); }
    .hero-btn svg { width: 14px; height: 14px; }

    /* ── Bottom bar ── */
    .hero-bottom {
      position: absolute; bottom: 0; left: 0; right: 0;
      z-index: 10;
      display: flex; align-items: flex-end; justify-content: space-between;
      padding: 0 60px 32px;
    }

    /* Left: counter + dots */
    .slide-info { display: flex; flex-direction: column; gap: 14px; }
    .slide-counter {
      font-family: 'Archivo', sans-serif; font-size: 0.68rem;
      color: rgba(237,237,235,0.38); letter-spacing: 0.15em;
    }
    .slide-counter span { color: #EDEDEB; }
    .slide-dots { display: flex; gap: 6px; align-items: center; }
    .dot {
      height: 2px; width: 20px;
      background: rgba(237,237,235,0.2); cursor: pointer;
      transition: width 0.4s ease, background 0.4s ease;
    }
    .dot.active { width: 40px; background: #EDEDEB; }

    /* Right: prev/next thumbnail cards (reference style) */
    .hero-nav-cards {
      display: flex; align-items: center; gap: 0;
    }
    .nav-card {
      display: flex; align-items: center; gap: 14px;
      padding: 12px 20px; cursor: pointer;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(9,9,15,0.45);
      backdrop-filter: blur(12px);
      transition: background 0.2s;
    }
    .nav-card:hover { background: rgba(255,255,255,0.06); }
    .nav-card.prev { border-right: none; }
    .nav-card-thumb {
      width: 52px; height: 38px; border-radius: 2px;
      background-size: cover; background-position: center;
      flex-shrink: 0; opacity: 0.7;
    }
    .nav-card-text { display: flex; flex-direction: column; gap: 3px; }
    .nav-card-dir {
      font-size: 0.52rem; color: rgba(237,237,235,0.35);
      letter-spacing: 0.25em; text-transform: uppercase;
    }
    .nav-card-name {
      font-family: 'Archivo', sans-serif; font-size: 0.78rem;
      color: rgba(237,237,235,0.72);
    }
    .nav-card-arrow {
      width: 28px; height: 28px; border-radius: 50%;
      border: 1px solid rgba(237,237,235,0.2);
      display: flex; align-items: center; justify-content: center;
      color: rgba(237,237,235,0.55); flex-shrink: 0;
      transition: border-color 0.2s, color 0.2s;
    }
    .nav-card:hover .nav-card-arrow { border-color: rgba(237,237,235,0.6); color: #EDEDEB; }
    .nav-card-arrow svg { width: 12px; height: 12px; }

    /* Bottom thin progress line */
    .progress-bar {
      position: absolute; bottom: 0; left: 0; height: 2px;
      background: #22D3EE; z-index: 20;
      transition: none;
    }

    @media(max-width: 900px) {
      .hero-main { left: 28px; right: 28px; }
      .hero-h1 { font-size: clamp(3.5rem, 14vw, 6rem); }
      .hero-side { display: none; }
      .hero-bottom { padding: 0 24px 24px; }
      .hero-nav-cards { display: none; }
    }

    /* ═══════════════════════════════════════════════════════════
       ABOUT
    ═══════════════════════════════════════════════════════════ */
    .sec-label {
      display: flex; align-items: center; gap: 12px; margin-bottom: 52px;
    }
    .sec-num  { font-family:'Archivo',sans-serif; font-size:0.65rem; color:#22D3EE; letter-spacing:0.22em; font-weight:500; }
    .sec-line { display:inline-block; width:30px; height:1px; background:#22D3EE; }
    .sec-tag  { font-size:0.65rem; color:rgba(237,237,235,0.32); letter-spacing:0.22em; text-transform:uppercase; }

    #about {
      padding: 120px 60px 100px;
      background: #0B0B12;
      position: relative;
    }
    .ghost-num {
      position: absolute; top: 40px; right: 60px;
      font-family: 'Archivo', sans-serif; font-weight: 900;
      font-size: 14rem; line-height: 1; color: rgba(255,255,255,0.025);
      pointer-events: none; user-select: none; letter-spacing: -0.04em;
    }
    .about-wrap { max-width: 1200px; margin: 0 auto; }
    .about-h2 {
      font-family: 'Archivo', sans-serif; font-weight: 300;
      font-size: clamp(2.4rem, 5vw, 4.2rem);
      line-height: 1.12; color: #EDEDEB; letter-spacing: -0.01em;
      margin-bottom: 40px;
    }
    .about-h2 em { font-style: italic; color: rgba(237,237,235,0.45); font-weight: 200; }
    .about-bio {
      max-width: 540px; margin-left: auto;
    }
    .about-bio p { font-size: 0.92rem; color: rgba(237,237,235,0.48); line-height: 1.75; margin-bottom: 14px; }

    .stat-strip {
      display: grid; grid-template-columns: repeat(3,1fr);
            margin-top: 72px;
    }
    .stat-cell {
      padding: 44px 40px; border-right: 1px solid rgba(255,255,255,0.07);
    }
    .stat-cell:last-child { border-right: none; }
    .stat-n {
      font-family: 'Archivo', sans-serif; font-weight: 900;
      font-size: 4rem; line-height: 1; color: #EDEDEB;
      margin-bottom: 10px; letter-spacing: -0.02em;
    }
    .stat-lab { font-size: 0.75rem; color: #22D3EE; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 8px; }
    .stat-desc { font-size: 0.8rem; color: rgba(237,237,235,0.38); line-height: 1.6; }
    @media(max-width:768px){
      #about { padding: 80px 24px 70px; }
      .ghost-num { font-size: 8rem; right: 16px; }
      .stat-strip { grid-template-columns: 1fr; }
      .stat-cell { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.07); }
      .about-bio { margin-left: 0; }
    }

    /* ═══════════════════════════════════════════════════════════
       CONTACT
    ═══════════════════════════════════════════════════════════ */
    #contact {
      padding: 120px 60px 100px;
      background: transparent;
      position: relative; text-align: center;
    }
    .contact-ghost {
      position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
      font-family: 'Archivo', sans-serif; font-weight: 900;
      font-size: clamp(6rem, 18vw, 15rem); line-height: 1;
      color: rgba(255,255,255,0.025); pointer-events: none;
      white-space: nowrap; letter-spacing: -0.04em; user-select: none;
    }
    .contact-in { position: relative; z-index: 1; max-width: 600px; margin: 0 auto; }
    .contact-h2 {
      font-family: 'Archivo', sans-serif; font-weight: 900;
      font-size: clamp(2.8rem, 6vw, 5rem);
      line-height: 0.95; letter-spacing: -0.03em; margin-bottom: 24px;
    }
    .contact-sub {
      font-size: 0.92rem; color: rgba(237,237,235,0.45);
      line-height: 1.7; margin-bottom: 44px;
    }
    .contact-email {
      display: block; font-family: 'Archivo', sans-serif; font-weight: 300;
      font-size: clamp(1.1rem, 2.5vw, 1.6rem);
      color: #EDEDEB; text-decoration: none; letter-spacing: 0.04em;
      border-bottom: 1px solid rgba(237,237,235,0.15);
      padding-bottom: 6px; margin-bottom: 56px;
      transition: color 0.2s, border-color 0.2s;
    }
    .contact-email:hover { color: #22D3EE; border-color: #22D3EE; }
    .contact-divider { width: 1px; height: 40px; background: rgba(255,255,255,0.1); margin: 0 auto 40px; }
    .soc-row { display: flex; align-items: center; justify-content: center; gap: 20px; flex-wrap: wrap; }
    .soc-link { font-size: 0.68rem; color: rgba(237,237,235,0.38); letter-spacing: 0.2em; text-transform: uppercase; text-decoration: none; transition: color 0.2s; }
    .soc-link:hover { color: #EDEDEB; }
    .soc-sep { width: 3px; height: 3px; border-radius: 50%; background: rgba(237,237,235,0.2); }
    @media(max-width:768px){ #contact { padding: 80px 24px 70px; } }

    /* ── Footer ── */
    footer {
      display: flex; align-items: center; justify-content: space-between;
      padding: 28px 60px;
      background: #161616;
      border-top: 1px solid rgba(255,255,255,0.06);
          }
    .foot-logo { font-family:'Archivo',sans-serif; font-weight:300; font-size:0.85rem; color:rgba(237,237,235,0.3); letter-spacing:0.18em; text-transform:uppercase; }
    .foot-copy { font-size:0.72rem; color:rgba(237,237,235,0.22); letter-spacing:0.08em; }
    @media(max-width:768px){ footer { padding: 22px 24px; } }
  </style>
</head>

<script>
  /* ── Slide data ── */
  const SLIDES = [
    { src: 'hero/1.png', label: '01' },
    { src: 'hero/2.png', label: '02' },
    { src: 'hero/3.png', label: '03' },
    { src: 'hero/4.png', label: '04' },
    { src: 'hero/5.png', label: '05' },
    { src: 'hero/6.png', label: '06' },
  ];
  const INTERVAL = 5000;

  const slides    = document.querySelectorAll('.slide');
  const dots      = document.querySelectorAll('.dot');
  const curNum    = document.getElementById('cur-num');
  const prevThumb = document.getElementById('prev-thumb');
  const nextThumb = document.getElementById('next-thumb');
  const prevName  = document.getElementById('prev-name');
  const nextName  = document.getElementById('next-name');
  const progBar   = document.getElementById('prog-bar');
  let current     = 0;
  let timer       = null;
  let progTimer   = null;

  function pad(n) { return String(n + 1).padStart(2, '0'); }

  function goTo(n) {
    slides[current].classList.remove('active');
    dots[current].classList.remove('active');
    current = ((n % SLIDES.length) + SLIDES.length) % SLIDES.length;
    slides[current].classList.add('active');
    dots[current].classList.add('active');

    const prev = ((current - 1) + SLIDES.length) % SLIDES.length;
    const next = (current + 1) % SLIDES.length;

    curNum.textContent    = pad(current);
    prevName.textContent  = SLIDES[prev].label;
    nextName.textContent  = SLIDES[next].label;
    prevThumb.style.backgroundImage = `url('${SLIDES[prev].src}')`;
    nextThumb.style.backgroundImage = `url('${SLIDES[next].src}')`;

    startProgress();
  }

  function startProgress() {
    clearTimeout(progTimer);
    progBar.style.transition = 'none';
    progBar.style.width = '0%';
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        progBar.style.transition = `width ${INTERVAL}ms linear`;
        progBar.style.width = '100%';
      });
    });
    clearTimeout(timer);
    timer = setTimeout(() => goTo(current + 1), INTERVAL);
  }

  /* Dot clicks */
  dots.forEach(dot => {
    dot.addEventListener('click', () => goTo(+dot.dataset.i));
  });

  /* Prev / Next buttons */
  document.getElementById('btn-prev').addEventListener('click', () => goTo(current - 1));
  document.getElementById('btn-next').addEventListener('click', () => goTo(current + 1));

  /* Keyboard ← → */
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft')  goTo(current - 1);
    if (e.key === 'ArrowRight') goTo(current + 1);
  });

  /* Touch swipe on hero */
  let tx = 0;
  document.getElementById('hero').addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive: true });
  document.getElementById('hero').addEventListener('touchend', e => {
    const diff = tx - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 50) goTo(current + (diff > 0 ? 1 : -1));
  });

  /* Init */
  goTo(0);

  /* ── Mobile menu ── */
  const mobBtn  = document.getElementById('mob-btn');
  const mobMenu = document.getElementById('mob-menu');
  mobBtn.addEventListener('click', () => {
    mobMenu.style.display = mobMenu.style.display === 'block' ? 'none' : 'block';
  });

  /* ── Scroll reveal ── */
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('on'); observer.unobserve(e.target); } });
  }, { threshold: 0.15 });
  document.querySelectorAll('.r').forEach(el => observer.observe(el));
</script>
